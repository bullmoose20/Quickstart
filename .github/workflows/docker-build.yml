on:
  workflow_call:
    inputs:
      branch:
        required: false
        default: master
        type: string
      repository:
        required: false
        default: ${{ vars.REPO_NAME }}
        type: string
      branch_name:
        required: false
        default: master
        type: string
      tag_name:
        required: true
        type: string
      full_build:
        required: false
        default: true
        type: boolean
jobs:
  create-matrix:
    name: Create Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set Matrix
        id: set-matrix
        run: |
          
          base_matrix='{ "include": [ { "platform": "linux/amd64", "dockerfile": "Dockerfile", "tag": "amd64" }, { "platform": "linux/arm64", "dockerfile": "Dockerfile", "tag": "arm64" } ] }'
          matrix_to_add='{"platform": "linux/arm/v7", "dockerfile": "Dockerfile.arm7", "tag": "armv7"}'

          # Check the boolean input and conditionally add to the matrix
          if ${{ inputs.full_build }}; then
            full_matrix=$(echo "$base_matrix" | jq --argjson new_entry "$matrix_to_add" '.include += [$new_entry]')
          else
            full_matrix="$base_matrix"
          fi
          echo "matrix=$full_matrix" >> "$GITHUB_OUTPUT"


  docker-build:
    name: ${{ matrix.tag }} Build
    runs-on: ubuntu-latest
    needs: [ create-matrix ]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.create-matrix.outputs.matrix) }}
    steps:

      - name: Create App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_TOKEN }}

      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ inputs.branch }}
          repository: ${{ inputs.repository }}
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./${{ matrix.dockerfile }}
          build-args: |
            "BRANCH_NAME=${{ inputs.branch_name }}"
          platforms: ${{ matrix.platform }}
          tags: ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:${{ inputs.tag_name }}-${{ matrix.tag }}
          push: true
          provenance: false
          sbom: false


  create-manifest:
    name: Create Manifest
    runs-on: ubuntu-latest
    needs: [ docker-build ]
    steps:

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master
        with:
          platforms: all

      - name: Create manifest and push
        run: |
          manifest_command="docker manifest create \
            ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:${{ inputs.tag_name }} \
            --amend ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:${{ inputs.tag_name }}-amd64 \
            --amend ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:${{ inputs.tag_name }}-arm64"
      
          if ${{ inputs.full_build }}; then
            manifest_command+=" --amend ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:${{ inputs.tag_name }}-armv7"
          fi
      
          echo "$manifest_command"
          eval "$manifest_command"
          
          docker manifest push ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:${{ inputs.tag_name }}

      - name: Delete Extra Images
        run: |
          HUB_TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d "{\"username\": \"${{ secrets.DOCKER_HUB_USERNAME }}\", \"password\": \"${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}\"}" https://hub.docker.com/v2/users/login/ | jq -r .token)
          
          curl -i -X DELETE -H "Accept: application/json" -H "Authorization: JWT $HUB_TOKEN" \
          https://hub.docker.com/v2/repositories/${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}/tags/${{ inputs.tag_name }}-amd64/
          
          curl -i -X DELETE -H "Accept: application/json" -H "Authorization: JWT $HUB_TOKEN" \
          https://hub.docker.com/v2/repositories/${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}/tags/${{ inputs.tag_name }}-arm64/
          
          if ${{ inputs.full_build }}; then
            curl -i -X DELETE -H "Accept: application/json" -H "Authorization: JWT $HUB_TOKEN" \
            https://hub.docker.com/v2/repositories/${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}/tags/${{ inputs.tag_name }}-armv7/
          fi

