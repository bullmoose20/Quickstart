name: Hotfix Release

on:
  pull_request_target:
    branches: [ hotfix ]
    types: [ closed ]

jobs:

  release-hoxfix:
    name: Create Hotfix Release
    runs-on: ubuntu-latest
    steps:

      - name: Create App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_TOKEN }}

      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: hotfix
          fetch-depth: 0

      - name: Create Hotfix Release Commit and Synchronize Branches
        run: |
          version=$(cat VERSION)
          echo "CURRENT_VERSION: '${version}'"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$version"
          
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))"
          
          echo "NEW_VERSION='${NEW_VERSION}'"
          echo "new_ver=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "$NEW_VERSION" > "VERSION"
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION
          git commit -m "${{ vars.NAME }} Hotfix Release ${NEW_VERSION}"
          git push origin hotfix
          git push origin refs/heads/hotfix:refs/heads/master

      - name: Rebase Develop
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git checkout develop
          git rebase origin/master
          git push -u origin develop

