name: Validate Pull Request

on:
  pull_request_target:
    types: [ opened, synchronize, reopened, labeled ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  validate-changes:
    name: Validate Changes
    runs-on: ubuntu-latest
    outputs:
      part: ${{ steps.list-changes.outputs.part }}
      build: ${{ steps.list-changes.outputs.build }}
    steps:

      - name: Display Refs
        run: |
          echo "Base Repo: ${{ github.event.pull_request.base.repo.full_name }}"
          echo "Base Ref: ${{ github.base_ref }}"
          echo "Head Repo: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "Head Ref: ${{ github.event.pull_request.head.ref }}"

      - name: Check for Remote Branch
        if: "!contains(github.event.pull_request.labels.*.name, 'approved')"
        run: |
          repo_name=${{ github.event.pull_request.head.repo.full_name }}
          base_name="${repo_name%/*}"
        
          if [[ "${base_name}" != "Kometa-Team" ]]; then
              echo "ERROR: Pull Requests must be approved before they can run workflows"
              exit 1
          fi

      - name: Create App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_TOKEN }}

      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Check Base Branch
        if: github.base_ref == 'master'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr close ${{ github.event.pull_request.number }} --comment "Pull Requests cannot be submitted to master. Please resubmit the Pull Request to the develop branch."
          echo "ERROR: Pull Requests cannot be submitted to master. Please resubmit the Pull Request to the develop branch"
          exit 1

      - name: Get Changes
        id: get-changes
        run: | 
          git remote add -f upstream https://github.com/Kometa-Team/${{ vars.REPO_NAME }}.git
          git remote update
          if [[ ${{ github.event.action }} == "labeled" ]]; then
              echo "files=$(git diff --name-only upstream/develop HEAD | xargs)" >> $GITHUB_OUTPUT
          else
              echo "files=$(git diff --name-only HEAD^ | xargs)" >> $GITHUB_OUTPUT
          fi

      - name: List Changed Files
        id: list-changes
        run: |
          for file in ${{ steps.get-changes.outputs.files }}; do
              if [[ $file =~ ^(PART).*$ ]] ; then
                  echo "build=true" >> $GITHUB_OUTPUT
              elif [[ $file =~ ^(modules|static|templates|quickstart.py|requirements.txt|.dockerignore|Dockerfile).*$ ]] ; then
                  echo "$file will trigger builds"
                  echo "part=true" >> $GITHUB_OUTPUT
              else
                  echo "$file will not trigger builds"
              fi
          done

      - name: Run Spellcheck on Changed Files
        id: spellcheck
        uses: rojopolis/spellcheck-github-actions@0.58.0
        with:
          task_name: Markdown
          source_files: ${{ steps.changed_files.outputs.all_changed_files }}


  format-code:
    name: Format Code and Add Part File
    if: needs.validate-changes.outputs.build != 'true' && needs.validate-changes.outputs.part == 'true'
    runs-on: ubuntu-latest
    needs: [ validate-changes ]
    steps:

      - name: Create App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_TOKEN }}

      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Format Code
        id: format-code
        run: |
            pip install -r requirements.txt
            pip install black
            black . -l 180

      - name: Update PART File and Commit
        id: update-version
        if: contains(github.event.pull_request.labels.*.name, 'build') || contains(github.event.pull_request.labels.*.name, 'build-full')
        run: |
          branch_name=${{ github.event.pull_request.head.ref }}
          repo_name=${{ github.event.pull_request.head.repo.full_name }}
          base_name="${repo_name%/*}"
          if [[ "${branch_name}" =~ ^(master|develop)$ ]]; then 
              tag_name="${base_name}"
          else
              tag_name="${branch_name}"
          fi
          echo "tag-name=${tag_name}" >> $GITHUB_OUTPUT
        
          if [[ "${base_name}" == "Kometa-Team" ]]; then
              extra=""
          else
              extra=" from the ${{ github.event.pull_request.head.repo.full_name }} repo"
          fi
          echo "extra-text=${extra}" >> $GITHUB_OUTPUT
          
          old_msg=$(git log -1 HEAD --pretty=format:%s)
          echo "commit-msg=${old_msg}" >> $GITHUB_OUTPUT
        
          part=$(cat PART)
          if [ -n "$part" ]; then
              new_value="$((${part} + 1))"
          else
              new_value="1"
          fi
    
          echo "part_value=${new_value}" >> $GITHUB_OUTPUT
    
          echo "$new_value" > "PART"
        
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "${tag_name} Part: ${new_value}"
          git push

      - name: Check Diff
        id: verify_diff
        run: |
            git diff --quiet . || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit Code Format Changes
        if: steps.verify_diff.outputs.changed == 'true' && !contains(github.event.pull_request.labels.*.name, 'build') && !contains(github.event.pull_request.labels.*.name, 'build-full')
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Code Format"
          git push


  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    if: needs.validate-changes.outputs.build == 'true'
    outputs:
      tag-name: ${{ steps.get-data.outputs.tag-name }}
      version: ${{ steps.get-data.outputs.version }}
      part: ${{ steps.get-data.outputs.part }}
    needs: [ validate-changes ]
    steps:

      - name: Create App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_TOKEN }}

      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Get Version
        id: get-data
        run: |
          branch_name=${{ github.event.pull_request.head.ref }}
          base_name="${repo_name%/*}"
          if [[ "${branch_name}" =~ ^(master|develop)$ ]]; then 
              tag_name="${base_name}"
          else
              tag_name="${branch_name}"
          fi
          echo "tag-name=${tag_name}" >> $GITHUB_OUTPUT
          echo "version=$(cat VERSION)-build$(cat BUILDNUM)" >> $GITHUB_OUTPUT
          part=$(cat PART)
          echo "part=${part}" >> $GITHUB_OUTPUT
          

  docker-build-pull:
    name: Docker
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
    needs: [ validate-changes, get-version ]
    if: needs.validate-changes.outputs.build == 'true'
    with:
      branch: ${{ github.event.pull_request.head.ref }}
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      branch_name: ${{ needs.get-version.outputs.tag-name }}
      tag_name: ${{ needs.get-version.outputs.tag-name }}
      full_build: ${{ contains(github.event.pull_request.labels.*.name, 'build-full') }}
          

  build-executable:
    name: Build ${{ matrix.os_upper }} Executable
    runs-on: ${{ matrix.os }}-${{ matrix.os_version }}
    if: needs.validate-changes.outputs.build == 'true'
    needs: [ validate-changes, get-version ]
    outputs:
      windows: ${{ steps.save-links.outputs.windows }}
      ubuntu: ${{ steps.save-links.outputs.ubuntu }}
      macos: ${{ steps.save-links.outputs.macos }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: 'windows'
            os_upper: 'Windows'
            os_version: 'latest'
            ext: '.exe'
          - os: 'ubuntu'
            os_upper: 'Linux'
            os_version: 'latest'
            ext: ''
          - os: 'macos'
            os_upper: 'MacOS'
            os_version: '13'
            ext: ''
    steps:

      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Requirements
        run: pip install -r requirements.txt pyinstaller

      - name: Build Executable
        id: build-executable
        shell: bash
        run: |
          filename="Quickstart-v${{ needs.get-version.outputs.version }}.${{ needs.get-version.outputs.tag-name }}${{ needs.get-version.outputs.part }}-${{ runner.os }}${{ matrix.ext }}"
          echo "filename=${filename}" >> $GITHUB_OUTPUT
          pyinstaller -y ./quickstart.spec -- --branch pull --build ${{ runner.os }}
          mv dist/Quickstart${{ matrix.ext }} dist/${filename}

      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        id: artifact-upload-step
        with:
          name: ${{ steps.build-executable.outputs.filename }}
          path: dist/${{ steps.build-executable.outputs.filename }}

      - name: Save Links to Env Vars
        id: save-links
        shell: bash
        run: |
          link_text=$"[${{ steps.build-executable.outputs.filename }}](${{ steps.artifact-upload-step.outputs.artifact-url }})"
          echo "${{ matrix.os }}=${link_text}" >> $GITHUB_OUTPUT
          

  add-links:
    name: Add Links to PR
    runs-on: ubuntu-latest
    needs: [ get-version, build-executable ]
    steps:

      - name: Create App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_TOKEN }}

      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Print Links
        run: |
          echo "${{ needs.build-executable.outputs.windows }}"
          echo "${{ needs.build-executable.outputs.ubuntu }}"
          echo "${{ needs.build-executable.outputs.macos }}"

      - name: Generate Body
        id: generate-body
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_BODY=$(cat <<EOF
          ${{ github.event.pull_request.body }}
          EOF
          )
          
          PR_BODY=$(echo "$PR_BODY" | sed -z 's/\n## Executables.*//')
          PR_BODY+=$'\n\n## Executables'
          PR_BODY+=$'\n\n**${{ needs.build-executable.outputs.windows }}**'
          PR_BODY+=$'\n\n**${{ needs.build-executable.outputs.ubuntu }}**'
          PR_BODY+=$'\n\n**${{ needs.build-executable.outputs.macos }}**'
          PR_BODY+=$'\n\n## Docker Image'
          PR_BODY+=$'\n\n**`${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:${{ needs.get-version.outputs.tag-name }}`**'
          
          gh pr edit "${{ github.event.number }}" --body "$PR_BODY"

  failure-notification:
    name: Failure Notification
    runs-on: ubuntu-latest
    needs: [ get-version, build-executable, add-links ]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    steps:

      - name: Discord Failure Notification
        uses: Kometa-Team/discord-notifications@master
        with:
          webhook_id_token: ${{ secrets.BUILD_WEBHOOK }}
          message: ${{ vars.BUILD_FAILURE_ROLE }}
          title: "${{ vars.NAME }} ${{ needs.get-version.outputs.tag-name }}: ${{ vars.TEXT_FAILURE }}"
          url: https://github.com/Kometa-Team/${{ vars.REPO_NAME }}/actions/runs/${{ github.run_id }}
          color: ${{ vars.COLOR_FAILURE }}
          username: ${{ vars.BOT_NAME }}
          avatar_url: ${{ vars.BOT_IMAGE }}
          author: ${{ vars.DOCKER_NAME }}
          author_icon_url: ${{ vars.DOCKER_IMAGE }}
