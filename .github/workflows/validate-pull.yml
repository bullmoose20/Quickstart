name: Validate Pull Request

on:
  pull_request_target:
    types: [ opened, synchronize, reopened, labeled ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  validate-pull:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    outputs:
      part: ${{ steps.list-changes.outputs.part }}
      build: ${{ steps.list-changes.outputs.build }}
    steps:

      - name: Display Refs
        run: |
          echo "Base Repo: ${{ github.event.pull_request.base.repo.full_name }}"
          echo "Base Ref: ${{ github.base_ref }}"
          echo "Head Repo: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "Head Ref: ${{ github.event.pull_request.head.ref }}"

      - name: Check Base Branch
        if: github.base_ref == 'master'
        run: |
          echo "ERROR: Pull Requests cannot be submitted to master. Please submit the Pull Request to the develop branch"
          exit 1

      - name: Check for Remote Branch
        if: "!contains(github.event.pull_request.labels.*.name, 'approved')"
        run: |
          repo_name=${{ github.event.pull_request.head.repo.full_name }}
          base_name="${repo_name%/*}"
        
          if [[ "${base_name}" != "Kometa-Team" ]]; then
              echo "ERROR: Pull Requests must be approved before they can run workflows"
              exit 1
          fi

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Get changes
        id: get-changes
        run: | 
            git remote add -f upstream https://github.com/Kometa-Team/${{ vars.REPO_NAME }}.git
            git remote update
            if [[ ${{ github.event.action }} == "labeled" ]]; then
                echo "files=$(git diff --name-only upstream/develop HEAD | xargs)" >> $GITHUB_OUTPUT
            else
                echo "files=$(git diff --name-only HEAD^ | xargs)" >> $GITHUB_OUTPUT
            fi

      - name: List changed files
        id: list-changes
        run: |
            for file in ${{ steps.get-changes.outputs.files }}; do
                if [[ $file =~ ^(PART).*$ ]] ; then
                    echo "build=true" >> $GITHUB_OUTPUT
                elif [[ $file =~ ^(modules|static|templates|quickstart.py|requirements.txt|.dockerignore|Dockerfile).*$ ]] ; then
                    echo "$file will trigger builds"
                    echo "part=true" >> $GITHUB_OUTPUT
                else
                    echo "$file will not trigger builds"
                fi
            done

      - name: Run Spellcheck on changed files
        id: spellcheck
        uses: rojopolis/spellcheck-github-actions@0.51.0
        with:
          task_name: Markdown
          source_files: ${{ steps.changed_files.outputs.all_changed_files }}


  format-code:
    name: Format Code and Add Part
    if: needs.validate-pull.outputs.build != 'true' && needs.validate-pull.outputs.part == 'true'
    runs-on: ubuntu-latest
    needs: [ validate-pull ]
    steps:

      - name: Create App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_TOKEN }}

      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Format Code
        id: format-code
        run: |
            pip install -r requirements.txt
            pip install black
            black . -l 180

      - name: Update VERSION File
        id: update-version
        if: contains(github.event.pull_request.labels.*.name, 'build')
        run: |
            branch_name=${{ github.event.pull_request.head.ref }}
            repo_name=${{ github.event.pull_request.head.repo.full_name }}
            base_name="${repo_name%/*}"
            if [[ "${branch_name}" =~ ^(master|develop)$ ]]; then 
                tag_name="${base_name}"
            else
                tag_name="${branch_name}"
            fi
            echo "tag-name=${tag_name}" >> $GITHUB_OUTPUT
          
            if [[ "${base_name}" == "Kometa-Team" ]]; then
                extra=""
            else
                extra=" from the ${{ github.event.pull_request.head.repo.full_name }} repo"
            fi
            echo "extra-text=${extra}" >> $GITHUB_OUTPUT
            
            value=$(cat VERSION)
            old_msg=$(git log -1 HEAD --pretty=format:%s)
            echo "commit-msg=${old_msg}" >> $GITHUB_OUTPUT
          
            part=$(cat PART)
            if [ -n "$part" ]; then
                new_value="$((${part} + 1))"
            else
                new_value="1"
            fi
      
            echo "part_value=${new_value}" >> $GITHUB_OUTPUT
      
            echo "$new_value" > "PART"
          
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add .
            git commit -m "${tag_name} Part: ${new_value}"
            git push

      - name: Check if there are any changes
        id: verify_diff
        run: |
            git diff --quiet . || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit
        if: steps.verify_diff.outputs.changed == 'true' && !contains(github.event.pull_request.labels.*.name, 'build')
        run: |
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add .
            git commit -m "Code Format"
            git push


  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    if: needs.validate-pull.outputs.build == 'true'
    outputs:
      tag-name: ${{ steps.get-data.outputs.tag-name }}
      version: ${{ steps.get-data.outputs.version }}
      part: ${{ steps.get-data.outputs.part }}
    needs: [ validate-pull ]
    steps:

      - name: Create App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_TOKEN }}

      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Get Version
        id: get-data
        run: |
          branch_name=${{ github.event.pull_request.head.ref }}
          base_name="${repo_name%/*}"
          if [[ "${branch_name}" =~ ^(master|develop)$ ]]; then 
              tag_name="${base_name}"
          else
              tag_name="${branch_name}"
          fi
          echo "tag-name=${tag_name}" >> $GITHUB_OUTPUT
          
          version=$(cat VERSION)
          echo "version=${version}" >> $GITHUB_OUTPUT
          
          part=$(cat PART)
          echo "part=${part}" >> $GITHUB_OUTPUT
          

  build-executable:
    name: Build ${{ matrix.os_upper }} Executable
    runs-on: ${{ matrix.os }}-${{ matrix.os_version }}
    if: needs.validate-pull.outputs.build == 'true'
    needs: [ validate-pull, get-version ]
    outputs:
      windows: ${{ steps.save-links.outputs.windows }}
      ubuntu: ${{ steps.save-links.outputs.ubuntu }}
      macos: ${{ steps.save-links.outputs.macos }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: 'windows'
            os_upper: 'Windows'
            os_version: 'latest'
            ext: '.exe'
          - os: 'ubuntu'
            os_upper: 'Linux'
            os_version: 'latest'
            ext: ''
          - os: 'macos'
            os_upper: 'MacOS'
            os_version: '13'
            ext: ''
    steps:

      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Requirements
        run: pip install -r requirements.txt pyinstaller

      - name: Build Executable
        id: build-executable
        shell: bash
        run: |
          filename="Quickstart-${{ needs.get-version.outputs.version }}.${{ needs.get-version.outputs.tag-name }}${{ needs.get-version.outputs.part }}-${{ runner.os }}"
          echo "filename=${filename}" >> $GITHUB_OUTPUT
          pyinstaller -y ./quickstart.spec -- --branch pull --build ${{ runner.os }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        id: artifact-upload-step
        with:
          name: ${{ steps.build-executable.outputs.filename }}
          path: dist/Quickstart${{ matrix.ext }}

      - name: Save Links to Env Vars
        id: save-links
        shell: bash
        run: |
          link_text="[${{ steps.build-executable.outputs.filename }}](${{ steps.artifact-upload-step.outputs.artifact-url }})"
          echo "${{ matrix.os }}=${link_text}" >> $GITHUB_OUTPUT
          

  add-links:
    name: Add Links to PR
    runs-on: ubuntu-latest
    needs: [ build-executable ]
    steps:

      - name: Create App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_TOKEN }}

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Print Links
        run: |
          echo "${{ needs.build-executable.outputs.windows }}"
          echo "${{ needs.build-executable.outputs.ubuntu }}"
          echo "${{ needs.build-executable.outputs.macos }}"

      - name: Generate Body
        id: generate-body
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_BODY=$(cat <<EOF
          ${{ github.event.pull_request.body }}
          EOF
          )
          
          if [[ ! "$PR_BODY" =~ "<!--artifact_urls-->" ]]; then
              PR_BODY+=$'\n<!--artifact_urls-->\n---'
              PR_BODY+=$'\n<!--windows_url--><!--windows_url-->'
              PR_BODY+=$'\n<!--macos_url--><!--macos_url-->'
              PR_BODY+=$'\n<!--ubuntu_url--><!--ubuntu_url-->'
          fi
          
          tag_pattern="<!--windows_url-->"
          mod_str=$(echo "$PR_BODY" | sed -E "s#${tag_pattern}.*?${tag_pattern}#${tag_pattern}${{ needs.build-executable.outputs.windows }}${tag_pattern}#")
          
          tag_pattern="<!--macos_url-->"
          mod_str2=$(echo "$mod_str" | sed -E "s#${tag_pattern}.*?${tag_pattern}#${tag_pattern}${{ needs.build-executable.outputs.ubuntu }}${tag_pattern}#")
          
          tag_pattern="<!--ubuntu_url-->"
          mod_str3=$(echo "$mod_str2" | sed -E "s#${tag_pattern}.*?${tag_pattern}#${tag_pattern}${{ needs.build-executable.outputs.macos }}${tag_pattern}#")
          
          gh pr edit "${{ github.event.number }}" --body "$mod_str3"

  docker-build-pull:
    name: Docker Build ${{ matrix.tag }}
    runs-on: ubuntu-latest
    needs: [ validate-pull, get-version ]
    if: needs.validate-pull.outputs.build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'linux/amd64'
            dockerfile: 'Dockerfile'
            tag: 'amd64'
          - platform: 'linux/arm64'
            dockerfile: 'Dockerfile'
            tag: 'arm64'
          - platform: 'linux/arm/v7'
            dockerfile: 'Dockerfile.arm7'
            tag: 'armv7'
    steps:

      - name: Create App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_TOKEN }}

      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./${{ matrix.dockerfile }}
          build-args: |
            "BRANCH_NAME=${{ needs.get-version.outputs.tag-name }}"
          platforms: ${{ matrix.platform }}
          tags: ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:${{ needs.get-version.outputs.tag-name }}-${{ matrix.tag }}
          push: true
          provenance: false
          sbom: false


  create-manifest:
    name: Create and Push Docker Manifest
    runs-on: ubuntu-latest
    needs: [ get-version, docker-build-pull ]
    steps:

      - name: Create App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_TOKEN }}

      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: develop

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master
        with:
          platforms: all

      - name: Create manifest and push
        run: |
          docker manifest create \
            ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:${{ needs.get-version.outputs.tag-name }} \
            --amend ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:${{ needs.get-version.outputs.tag-name }}-amd64 \
            --amend ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:${{ needs.get-version.outputs.tag-name }}-arm64 \
            --amend ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:${{ needs.get-version.outputs.tag-name }}-armv7
          docker manifest push ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:${{ needs.get-version.outputs.tag-name }}

      - name: Delete Extra Images
        run: |
          HUB_TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d "{\"username\": \"${{ secrets.DOCKER_HUB_USERNAME }}\", \"password\": \"${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}\"}" https://hub.docker.com/v2/users/login/ | jq -r .token)
          curl -i -X DELETE \
          -H "Accept: application/json" \
          -H "Authorization: JWT $HUB_TOKEN" \
          https://hub.docker.com/v2/repositories/${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}/tags/${{ needs.get-version.outputs.tag-name }}-amd64/
          curl -i -X DELETE \
          -H "Accept: application/json" \
          -H "Authorization: JWT $HUB_TOKEN" \
          https://hub.docker.com/v2/repositories/${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}/tags/${{ needs.get-version.outputs.tag-name }}-arm64/
          curl -i -X DELETE \
          -H "Accept: application/json" \
          -H "Authorization: JWT $HUB_TOKEN" \
          https://hub.docker.com/v2/repositories/${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}/tags/${{ needs.get-version.outputs.tag-name }}-armv7/


  build-notification:
    name: Build Notification
    runs-on: ubuntu-latest
    needs: [ get-version, add-links, create-manifest ]
    steps:

      - name: Discord Success Notification
        uses: Kometa-Team/discord-notifications@master
        if: success()
        with:
          webhook_id_token: ${{ secrets.BUILD_WEBHOOK }}
          title: "${{ vars.REPO_NAME }} ${{ needs.get-version.outputs.tag-name }}: ${{ vars.TEXT_SUCCESS }}"
          url: https://github.com/Kometa-Team/${{ vars.REPO_NAME }}/actions/runs/${{ github.run_id }}
          color: ${{ vars.COLOR_SUCCESS }}
          username: ${{ vars.BOT_NAME }}
          avatar_url: ${{ vars.BOT_IMAGE }}
          author: ${{ vars.DOCKER_NAME }}
          author_icon_url: ${{ vars.DOCKER_IMAGE }}

      - name: Discord Failure Notification
        uses: Kometa-Team/discord-notifications@master
        if: failure()
        with:
          webhook_id_token: ${{ secrets.BUILD_WEBHOOK }}
          message: ${{ vars.BUILD_FAILURE_ROLE }}
          title: "${{ vars.REPO_NAME }} ${{ needs.get-version.outputs.tag-name }}: ${{ vars.TEXT_FAILURE }}"
          url: https://github.com/Kometa-Team/${{ vars.REPO_NAME }}/actions/runs/${{ github.run_id }}
          color: ${{ vars.COLOR_FAILURE }}
          username: ${{ vars.BOT_NAME }}
          avatar_url: ${{ vars.BOT_IMAGE }}
          author: ${{ vars.DOCKER_NAME }}
          author_icon_url: ${{ vars.DOCKER_IMAGE }}
