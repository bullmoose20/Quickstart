<!-- Rename Image Modal -->
<div class="modal fade" id="renameModal" tabindex="-1" aria-labelledby="renameModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">

      <!-- Modal Header -->
      <div class="modal-header">
        <h5 class="modal-title" id="renameModalLabel">Rename Image</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- Modal Body -->
      <div class="modal-body text-center">
        <!-- Image Preview -->
        <img id="rename-image-preview" src="" alt="Preview" class="img-fluid mb-3">

        <!-- Current Filename -->
        <p id="rename-current-name"></p>

        <!-- Rename Input Fields for Each Type (only one is shown at a time) -->
        <input type="text" id="mov-image-name" class="form-control rename-input mb-2" placeholder="Enter new movie name"
          style="display: none;">
        <input type="text" id="sho-image-name" class="form-control rename-input mb-2" placeholder="Enter new show name"
          style="display: none;">
        <input type="text" id="sea-image-name" class="form-control rename-input mb-2"
          placeholder="Enter new season name" style="display: none;">
        <input type="text" id="epi-image-name" class="form-control rename-input mb-2"
          placeholder="Enter new episode name" style="display: none;">
      </div>

      <!-- Modal Footer -->
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="rename-confirm-btn" class="btn btn-primary">OK</button>
      </div>

    </div>
  </div>
</div>
